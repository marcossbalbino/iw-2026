<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LeBron</title>

<style>
    body {
        background: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .container-father {
        width: 500px;
        height: 300px;
        background: white;
        border: 3px solid rgb(46, 46, 45);
        border-radius: 50px;
        position: relative;
        box-shadow: 0 0 3px rgba(255, 255, 255, 0.2);
        background-image: url('LeBron-James.jpeg');
        background-size: cover;
        background-position: center;
    }

    .title {
        text-align: center;
        margin-top: 40px;
        font-size: 32px;
        color: rgb(255, 255, 255);
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .line {
        position: absolute;
        bottom: 50px;
        left: 0;
        width: 100%;
        height: 2px;
        background: #6e06f5;
    }



    .container {
        position: absolute;
        border-bottom-left-radius: 100px;
        border-bottom-right-radius: 100px;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        bottom: 27px;
        right: 40px;
        border: 2px solid rgb(255, 238, 0);
        
    }

    .container img {
        width: 100%;
        height: 100%;
        border-radius: 8px;
        object-fit: cover; 
    }
</style>
</head>

<body>

<div class="container-father">
    <div class="title">LeBron</div>
    <div class="line"></div>
    <div class="bar"></div>
    <div class="container">
        <img src="lebron.jpeg" alt="Imagem do Quadrado">
    </div>
</div>

</body>
</html>
